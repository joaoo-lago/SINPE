<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SINPE 2.0 — Plataforma</title>
<style>
  :root{
    --bg:#eef1f4; --surface:#fff; --surface-2:#f6f8fa; --surface-3:#eef2f6;
    --ink:#131922; --muted:#59636f; --line:#dce1e7;
    --accent:#c0334e; --accent-ink:#8e2038; --accent-soft:#f6e2e6;
    --good:#1f9d57; --warn:#c67a12; --info:#2563c9; --pending:#8a94a0;
    --font:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --radius:11px;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#0e1319; --surface:#161c24; --surface-2:#1d2630; --surface-3:#222d38;
    --ink:#eaeef3; --muted:#93a0ad; --line:#2a343f;
    --accent:#e5556e; --accent-ink:#f09baa; --accent-soft:#3a2028;
    --good:#34c77b; --warn:#e0a64b; --info:#5b9bff; --pending:#6b7681;
  }}
  :root[data-theme="light"]{--bg:#eef1f4;--surface:#fff;--surface-2:#f6f8fa;--surface-3:#eef2f6;--ink:#131922;--muted:#59636f;--line:#dce1e7;--accent:#c0334e;--accent-ink:#8e2038;--accent-soft:#f6e2e6;--good:#1f9d57;--warn:#c67a12;--info:#2563c9;--pending:#8a94a0;}
  :root[data-theme="dark"]{--bg:#0e1319;--surface:#161c24;--surface-2:#1d2630;--surface-3:#222d38;--ink:#eaeef3;--muted:#93a0ad;--line:#2a343f;--accent:#e5556e;--accent-ink:#f09baa;--accent-soft:#3a2028;--good:#34c77b;--warn:#e0a64b;--info:#5b9bff;--pending:#6b7681;}

  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .hidden{display:none!important}

  /* ---------- Login ---------- */
  #login{min-height:100%;display:grid;place-items:center;padding:32px;
    background:radial-gradient(120% 90% at 80% -10%,var(--accent-soft) 0%,transparent 50%),var(--bg)}
  .login-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:32px;max-width:560px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.10)}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .glyph{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;
    background:var(--accent);color:#fff;font-weight:800;font-size:16px}
  .brand b{font-size:17px;letter-spacing:-.01em}
  .brand span{color:var(--muted);font-size:12.5px;display:block}
  .ecg{display:block;width:100%;height:34px;margin:14px 0 4px;color:var(--accent)}
  .ecg path{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  @media (prefers-reduced-motion:no-preference){.ecg path{stroke-dasharray:900;stroke-dashoffset:900;animation:draw 2.4s cubic-bezier(.6,.05,.2,1) .1s forwards}@keyframes draw{to{stroke-dashoffset:0}}}
  .login-card h1{font-size:20px;margin:12px 0 4px;letter-spacing:-.01em}
  .login-card .sub{color:var(--muted);font-size:14px;margin:0 0 20px}
  .field{display:grid;gap:5px;margin-bottom:14px}
  .field label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.02em}
  .field input,.field select{padding:10px 12px;border:1px solid var(--line);border-radius:9px;
    background:var(--surface-2);color:var(--ink);font-size:14px}
  .roles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:8px 0 20px}
  .role{border:1.5px solid var(--line);border-radius:11px;padding:14px 12px;background:var(--surface-2);
    text-align:left;transition:border-color .15s,transform .1s}
  .role:hover{transform:translateY(-2px)}
  .role[aria-pressed="true"]{border-color:var(--accent);background:var(--accent-soft)}
  .role .ic{font-size:20px}
  .role b{display:block;font-size:14px;margin-top:6px}
  .role small{color:var(--muted);font-size:11.5px;line-height:1.35;display:block;margin-top:2px}
  .enter{width:100%;padding:12px;border:0;border-radius:10px;background:var(--accent);color:#fff;
    font-weight:700;font-size:15px}
  .enter:hover{background:var(--accent-ink)}

  /* ---------- App shell ---------- */
  #app{min-height:100%;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--surface);
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  .topbar .glyph{width:30px;height:30px;font-size:14px;border-radius:8px}
  .topbar .title{font-weight:700;font-size:14px}
  .topbar .title span{color:var(--muted);font-weight:400}
  .spacer{flex:1}
  .rolechip{font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;
    background:var(--accent-soft);color:var(--accent-ink)}
  .ghost{border:1px solid var(--line);background:var(--surface-2);color:var(--ink);
    padding:7px 12px;border-radius:8px;font-size:12.5px;font-weight:600}
  .ghost:hover{border-color:var(--muted)}
  main{flex:1;padding:22px 20px 48px}
  .page{max-width:1180px;margin:0 auto}
  .page-head{margin-bottom:18px}
  .page-head h2{font-size:20px;margin:0 0 3px;letter-spacing:-.01em}
  .page-head p{color:var(--muted);font-size:13.5px;margin:0;max-width:70ch}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-ink);font-weight:700}

  /* ---------- Admin: tree editor ---------- */
  .editor{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .panel-head{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);
    background:var(--surface-2)}
  .panel-head h3{font-size:13px;margin:0;font-weight:700}
  .panel-head .count{margin-left:auto;font-size:11.5px;color:var(--muted);font-family:var(--mono)}
  .toolbar{display:flex;flex-wrap:wrap;gap:7px;padding:10px 14px;border-bottom:1px solid var(--line)}
  .tbtn{border:1px solid var(--line);background:var(--surface-2);color:var(--ink);padding:7px 11px;
    border-radius:8px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .tbtn:hover{border-color:var(--accent);color:var(--accent-ink)}
  .tbtn.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tbtn.pri:hover{background:var(--accent-ink)}
  .tbtn.danger:hover{border-color:var(--accent);color:var(--accent)}
  .tbtn:disabled{opacity:.4;cursor:not-allowed;border-color:var(--line);color:var(--muted)}
  .tree{padding:8px 6px;max-height:64vh;overflow:auto}
  .tnode{user-select:none}
  .trow{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:7px;cursor:pointer;font-size:13.5px}
  .trow:hover{background:var(--surface-2)}
  .trow.sel{background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
  .twist{width:16px;height:16px;flex:none;display:grid;place-items:center;color:var(--muted);font-size:10px;
    border-radius:4px;transition:transform .12s}
  .twist.open{transform:rotate(90deg)}
  .twist.leaf{visibility:hidden}
  .tlabel{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{font-size:9.5px;font-weight:700;letter-spacing:.03em;padding:2px 6px;border-radius:5px;flex:none;
    background:var(--surface-3);color:var(--muted);text-transform:uppercase}
  .badge.mult{background:color-mix(in srgb,var(--info) 16%,transparent);color:var(--info)}
  .badge.num{background:color-mix(in srgb,var(--warn) 16%,transparent);color:var(--warn)}
  .tchildren{margin-left:16px;border-left:1px dashed var(--line);padding-left:2px}

  .inspector{position:sticky;top:76px}
  .insp-body{padding:14px}
  .insp-empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 12px}
  .ifield{display:grid;gap:5px;margin-bottom:13px}
  .ifield label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.03em;text-transform:uppercase}
  .ifield input,.ifield select{padding:9px 10px;border:1px solid var(--line);border-radius:8px;
    background:var(--surface-2);color:var(--ink);font-size:13.5px;width:100%}
  .toggle{display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);
    border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px}
  .switch{width:38px;height:22px;border-radius:999px;background:var(--line);border:0;position:relative;flex:none}
  .switch[aria-pressed="true"]{background:var(--accent)}
  .switch i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .14s}
  .switch[aria-pressed="true"] i{left:18px}
  .insp-path{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:12px;word-break:break-word}

  .hint{background:var(--surface-2);border:1px dashed var(--line);border-radius:9px;padding:10px 12px;
    font-size:12px;color:var(--muted);margin-top:12px}
  .hint b{color:var(--ink)}

  /* ---------- Researcher ---------- */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .card h3{font-size:14px;margin:0 0 14px}
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:end;margin-bottom:16px}
  .controls .field{margin:0}
  .controls select{min-width:180px}
  .bars{display:grid;gap:10px}
  .bar-row{display:grid;grid-template-columns:130px 1fr 46px;gap:9px;align-items:center;font-size:13px}
  .bar-track{height:19px;background:var(--surface-2);border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;background:var(--accent);border-radius:6px;opacity:.9;transition:width .5s cubic-bezier(.5,0,.1,1)}
  .bar-fill.zero{background:var(--line)}
  .bar-row .v{text-align:right;color:var(--muted);font-family:var(--mono);font-size:12px}
  .donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .donut{width:120px;height:120px;border-radius:50%;flex:none;
    -webkit-mask:radial-gradient(circle 36px at center,transparent 98%,#000 100%);
    mask:radial-gradient(circle 36px at center,transparent 98%,#000 100%)}
  .legend{display:grid;gap:8px;font-size:13px}
  .legend div{display:flex;align-items:center;gap:8px}
  .legend i{width:11px;height:11px;border-radius:3px;flex:none}
  .legend b{font-family:var(--mono)} .legend small{color:var(--muted);margin-left:6px;font-family:var(--mono)}
  .result{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-top:16px}
  .result .stat{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:8px}
  .result .stat div{font-size:12px;color:var(--muted)}
  .result .stat b{display:block;font-size:18px;color:var(--ink);font-family:var(--mono);margin-top:2px}
  .result .verdict{font-size:13px;font-weight:600}
  .result .verdict.sig{color:var(--good)} .result .verdict.ns{color:var(--muted)}
  .ctable{border-collapse:collapse;width:100%;margin-top:6px;font-size:12.5px}
  .ctable th,.ctable td{border:1px solid var(--line);padding:6px 9px;text-align:center;font-family:var(--mono)}
  .ctable th{background:var(--surface-3);color:var(--muted);font-weight:600}
  .ctable td:first-child,.ctable th:first-child{text-align:left;font-family:var(--font)}

  /* ---------- Programmer ---------- */
  .kv{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .kv .tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .kv .k{font-size:24px;font-weight:750;letter-spacing:-.02em} .kv .k.ok{color:var(--good)}
  .kv .l{color:var(--muted);font-size:12px;margin-top:5px}
  .status-dot{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600}
  .status-dot::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--pending)}
  .status-dot.ok::before{background:var(--good)} .status-dot.ok{color:var(--good)}
  .status-dot.wip::before{background:var(--warn)} .status-dot.wip{color:var(--warn)}
  .table-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface)}
  table.data{border-collapse:collapse;width:100%;min-width:520px}
  table.data th,table.data td{text-align:left;padding:11px 15px;font-size:13px;border-bottom:1px solid var(--line)}
  table.data th{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600}
  table.data tr:last-child td{border-bottom:0}
  td.mod{font-family:var(--mono);font-size:12px}
  .console{background:#0d1117;color:#c9d1d9;border-radius:var(--radius);padding:14px 16px;font-family:var(--mono);
    font-size:12.5px;line-height:1.7;margin-top:14px;border:1px solid var(--line);overflow-x:auto}
  .console .g{color:#3fb950} .console .y{color:#d29922} .console .d{color:#8b949e}

  @media (max-width:820px){
    .editor{grid-template-columns:1fr}
    .inspector{position:static}
    .grid2{grid-template-columns:1fr}
    .roles{grid-template-columns:1fr}
    .kv{grid-template-columns:repeat(2,1fr)}
    .bar-row{grid-template-columns:104px 1fr 40px}
  }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <div class="glyph">S</div>
      <div><b>SINPE 2.0</b><span>Sistema Integrado de Protocolos Eletrônicos</span></div>
    </div>
    <svg class="ecg" viewBox="0 0 520 34" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0,17 L210,17 L222,17 L232,5 L243,29 L254,3 L265,23 L276,17 L320,17 L332,17 L342,11 L352,22 L362,17 L520,17"/>
    </svg>
    <h1>Acesso à plataforma</h1>
    <p class="sub">Selecione o tipo de usuário para entrar. Cada perfil vê uma parte diferente do sistema — como no SINPE original.</p>

    <div class="field"><label>Instituição</label>
      <select id="inst"><option>InCor Kubrusly — FEMPAR</option><option>Serviço Ambulatorial de Clínica Médica</option></select>
    </div>
    <div class="field"><label>Login</label><input id="user" value="j.lago" autocomplete="off"></div>

    <label style="font-size:12px;font-weight:600;color:var(--muted)">Tipo de usuário</label>
    <div class="roles" id="roles">
      <button class="role" data-role="admin" aria-pressed="true">
        <div class="ic">🌳</div><b>Administrador</b><small>Cria protocolos e monta a árvore de itens</small>
      </button>
      <button class="role" data-role="researcher" aria-pressed="false">
        <div class="ic">📊</div><b>Pesquisador</b><small>Cruza variáveis e vê gráficos e testes</small>
      </button>
      <button class="role" data-role="dev" aria-pressed="false">
        <div class="ic">🛠️</div><b>Programador</b><small>Manutenção e status técnico da plataforma</small>
      </button>
    </div>

    <button class="enter" id="enter">Entrar no SINPE</button>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="glyph">S</div>
    <div class="title">SINPE 2.0 <span id="ctx"></span></div>
    <div class="spacer"></div>
    <span class="rolechip" id="rolechip"></span>
    <button class="ghost" id="themeBtn">◐ Tema</button>
    <button class="ghost" id="switchBtn">Trocar perfil</button>
  </div>
  <main><div class="page" id="view"></div></main>
</div>

/* Contêineres que, por natureza clínica, admitem marcar vários itens ao mesmo tempo.
   Estes nascem como "seleção múltipla"; todo o resto nasce como "seleção única". */
const MULTI = new Set(["Fatores de risco","Sintomas associados","Sintomas",
  "Manifestações clínicas","Complicações","Sintomas associados","Lesão relacionada com isquemia"]);

/* Constrói a árvore a partir do SEED. Raiz = "Cardiologia" (item root do SINPE). */
function buildSeed(){
  const root = {id:nid(), label:"Cardiologia", type:"logical", selection:"single", media:false, open:true, children:[]};
  const stack = {0:root};
  SEED.trim().split("\n").forEach(line=>{
    const m = line.match(/^(\d+)\](.*)$/); if(!m) return;
    const depth = +m[1]; let rest = m[2].trim();
    if(rest.endsWith("]U")){ rest = rest.slice(0,-2).trim(); }
    const node = {id:nid(), label:rest, type:"logical",
      selection: MULTI.has(rest) ? "multiple" : "single", media:false, open:false, children:[]};
    const parent = stack[depth-1];
    if(parent){ parent.children.push(node); stack[depth]=node; }
  });
  return root;
}

/* Persistência local (para a demo sobreviver a um refresh). */
function loadTree(){
  try{ const s = localStorage.getItem("sinpe_tree_v1");
    if(s){ const t = JSON.parse(s); fixIds(t); return t; } }catch(e){}
  return buildSeed();
}
function fixIds(n){ if(!n.id) n.id=nid(); else { const k=+String(n.id).replace(/\D/g,""); if(k>=uid) uid=k+1; }
  (n.children||[]).forEach(fixIds); }
function saveTree(){ try{ localStorage.setItem("sinpe_tree_v1", JSON.stringify(TREE)); }catch(e){} }

function walk(n, fn){ fn(n); (n.children||[]).forEach(c=>walk(c,fn)); }
function countNodes(){ let c=0; walk(TREE,()=>c++); return c-1; } // exclui a raiz
function findParent(node, target, parent=null){
  if(node===target) return parent;
  for(const c of node.children||[]){ const r=findParent(c,target,node); if(r!==undefined&&r!==null||r===null&&c===target) if(r!==undefined) return r; }
  for(const c of node.children||[]){ const r=findParent(c,target,node); if(r!==undefined) return r; }
  return undefined;
}
function parentOf(target){
  let found;
  walk(TREE, n=>{ if((n.children||[]).includes(target)) found=n; });
  return found;
}

function drawTree(){
  const host = document.getElementById("tree");
  host.innerHTML = "";
  host.appendChild(nodeEl(TREE, true));
  document.getElementById("nodeCount").textContent = countNodes() + " itens";

function nodeEl(node, isRoot){
  const wrap = document.createElement("div"); wrap.className="tnode";
  const row = document.createElement("div");
  row.className = "trow" + (node===SELECTED?" sel":"");
  const hasKids = (node.children||[]).length>0;
  const tw = document.createElement("div");
  tw.className = "twist" + (hasKids?(node.open?" open":""):" leaf");
  tw.textContent = "▶";
  tw.onclick = (e)=>{ e.stopPropagation(); node.open=!node.open; drawTree(); };
  const lab = document.createElement("div"); lab.className="tlabel";
  lab.textContent = isRoot ? ("🫀 "+node.label) : node.label;
  row.appendChild(tw); row.appendChild(lab);
  if(!isRoot){
    if(node.selection==="multiple"){ const b=document.createElement("span"); b.className="badge mult"; b.textContent="múltipla"; row.appendChild(b); }
    if(node.type!=="logical"){ const b=document.createElement("span"); b.className="badge num"; b.textContent=node.type; row.appendChild(b); }
  }
  row.onclick = ()=>{ SELECTED=node; drawTree(); drawInsp(); };
  wrap.appendChild(row);
  if(hasKids && node.open){
    const kids = document.createElement("div"); kids.className="tchildren";
    node.children.forEach(c=>kids.appendChild(nodeEl(c,false)));
    wrap.appendChild(kids);
  }
  return wrap;
}

function addNode(kind){
  const target = SELECTED || TREE;
  const node = {id:nid(), label:"Novo item", type:"logical", selection:"single", media:false, open:false, children:[]};
  if(kind==="child"){ target.children.push(node); target.open=true; }
  else{
    if(target===TREE){ TREE.children.push(node); }
    else { const p = parentOf(target)||TREE; const i=p.children.indexOf(target); p.children.splice(i+1,0,node); }
  }
  SELECTED = node; saveTree(); drawTree(); drawInsp();
  const inp = document.getElementById("f_label"); if(inp){ inp.focus(); inp.select(); }
}
function renameNode(){ const inp=document.getElementById("f_label"); if(inp){ inp.focus(); inp.select(); } }
function deleteNode(){
  if(!SELECTED || SELECTED===TREE){ alert("Selecione um item (a raiz não pode ser excluída)."); return; }

}

function buildPath(target){
  const path=[]; (function rec(n){ if(n===target){path.unshift(n.label);return true;}
    for(const c of n.children||[]){ if(rec(c)){ path.unshift(n.label); return true; } } return false;
  })(TREE); return path;
}
function escapeHtml(s){ return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* Conjunto demonstrativo reconstruído dos 51 pacientes do TCC:
   marginais de SEXO e FAIXA ETÁRIA fiéis ao TCC; demais associações ilustrativas. */
const PATIENTS = (()=>{
  // PRNG determinístico (mulberry32) → resultados estáveis entre execuções.
  let seed=20250718; const rand=()=>{seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};
  const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
  const push=(arr,val,n)=>{for(let i=0;i<n;i++)arr.push(val);};
  const sexo=[]; push(sexo,"Masculino",27); push(sexo,"Feminino",22); push(sexo,"Indefinido",2);
  const faixa=[]; push(faixa,"18–32",2); push(faixa,"32–46",4); push(faixa,"46–60",10); push(faixa,"60–74",18); push(faixa,"74–88",17);
  const diag=[]; push(diag,"Hipertensão",30); push(diag,"Infarto (IAM)",8); push(diag,"D. coronariana",7); push(diag,"Arritmias",4); push(diag,"Insuf. cardíaca",2);
  const farm=[]; push(farm,"BRA",15); push(farm,"Diurético",6); push(farm,"Simpatolítico",6); push(farm,"Antiagregante",5); push(farm,"IECA",4); push(farm,"BCC",3); push(farm,"Sem fármaco",12);
  // embaralha cada campo isoladamente: marginais preservadas, associações realistas
  [sexo,faixa,diag,farm].forEach(shuffle);
  return sexo.map((s,i)=>({sexo:s, faixa:faixa[i], diagnostico:diag[i], farmaco:farm[i]}));
})();
const VARS = {sexo:"Sexo", faixa:"Faixa etária", diagnostico:"Diagnóstico", farmaco:"Classe de fármaco"};
const PALETTE = ["var(--accent)","color-mix(in srgb,var(--accent) 55%,var(--surface-2))","var(--info)","var(--warn)","var(--good)","var(--pending)","color-mix(in srgb,var(--accent) 25%,var(--surface-2))"];

}

/* qui-quadrado + p-valor (funções gama para o CDF) */
function lgamma(x){ const g=7,c=[0.99999999999980993,676.5203681218851,-1259.1392167224028,771.32342877765313,-176.61502916214059,12.507343278686905,-0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
  if(x<0.5) return Math.log(Math.PI/Math.sin(Math.PI*x))-lgamma(1-x);
  x-=1; let a=c[0]; const t=x+g+0.5; for(let i=1;i<g+2;i++)a+=c[i]/(x+i);
  return 0.5*Math.log(2*Math.PI)+(x+0.5)*Math.log(t)-t+Math.log(a); }
function lowerGammaReg(s,x){ if(x<=0)return 0; if(x<s+1){ let sum=1/s,term=sum; for(let n=1;n<200;n++){term*=x/(s+n);sum+=term;if(Math.abs(term)<Math.abs(sum)*1e-12)break;} return sum*Math.exp(-x+s*Math.log(x)-lgamma(s)); }
  // continued fraction para Q, então P=1-Q
  let b=x+1-s,c2=1e300,d=1/b,h=d; for(let i=1;i<200;i++){const an=-i*(i-s);b+=2;d=an*d+b;if(Math.abs(d)<1e-300)d=1e-300;c2=b+an/c2;if(Math.abs(c2)<1e-300)c2=1e-300;d=1/d;const del=d*c2;h*=del;if(Math.abs(del-1)<1e-12)break;}
  const Q=Math.exp(-x+s*Math.log(x)-lgamma(s))*h; return 1-Q; }
function chiSqP(chi2,df){ if(chi2<=0)return 1; return 1-lowerGammaReg(df/2,chi2/2); }

function drawCross(a,b){
  const host=document.getElementById("crossOut");
  if(a===b){ host.innerHTML=`<div class="result"><div class="verdict ns">Escolha duas variáveis diferentes para cruzar.</div></div>`; return; }
  const rows=[...new Set(PATIENTS.map(p=>p[a]))], cols=[...new Set(PATIENTS.map(p=>p[b]))];
  const obs=rows.map(r=>cols.map(c=>PATIENTS.filter(p=>p[a]===r&&p[b]===c).length));
  const n=PATIENTS.length, rt=obs.map(r=>r.reduce((x,y)=>x+y,0)), ct=cols.map((_,j)=>obs.reduce((s,r)=>s+r[j],0));
  let chi2=0; for(let i=0;i<rows.length;i++)for(let j=0;j<cols.length;j++){const e=rt[i]*ct[j]/n; if(e>0)chi2+=Math.pow(obs[i][j]-e,2)/e;}
  const df=(rows.length-1)*(cols.length-1), p=chiSqP(chi2,df), sig=p<0.05;
  const th=`<tr><th>${VARS[a]} \\ ${VARS[b]}</th>${cols.map(c=>`<th>${c}</th>`).join("")}<th>Σ</th></tr>`;
  const body=rows.map((r,i)=>`<tr><td>${r}</td>${obs[i].map(x=>`<td>${x}</td>`).join("")}<td>${rt[i]}</td></tr>`).join("");
  const foot=`<tr><td>Σ</td>${ct.map(x=>`<td>${x}</td>`).join("")}<td>${n}</td></tr>`;
  host.innerHTML=`
    <table class="ctable">${th}${body}${foot}</table>
    <div class="result">
      <div class="stat">
        <div>Teste<b>Qui-quadrado</b></div>
        <div>χ²<b>${chi2.toFixed(3)}</b></div>
        <div>gl<b>${df}</b></div>
        <div>p-valor<b>${p<0.001?"<0,001":p.toFixed(4).replace(".",",")}</b></div>
      </div>
      <div class="verdict ${sig?"sig":"ns"}">${sig
        ? "Associação estatisticamente significativa (p < 0,05)."
        : "Sem associação estatisticamente significativa ao nível de 5%."}</div>
    </div>`;
}
